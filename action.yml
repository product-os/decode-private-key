name: Decode GitHub App Private Key
description: 
  Decodes a GitHub App private key (PEM) from a base64-encoded or raw value and outputs it for use in signing requests. The decoded key is masked to prevent accidental exposure in logs.
author: Kyle Harding <kyle@balena.io>

branding:
  icon: unlock
  color: yellow

inputs:
  secret:
    description: GitHub App private key (PEM) to decode and mask. Accepts a raw PEM or base64-encoded value.
    required: true

outputs:
  private-key:
    description: The decoded GitHub App private key (PEM) to use for signing requests.
    value: ${{ steps.decode.outputs.private-key }}

runs:
  using: composite

  steps:
    - name: Decode the GitHub App Private Key
      id: decode
      shell: bash
      working-directory: ${{ runner.temp }}
      # Skip decode if -----BEGIN is detected in the body of the private key, which indicates that the key is not base64 encoded.
      # This allows users to use either raw or base64 encoded keys without needing to specify which format they are using.
      # Raw secrets are automatically masked by GitHub; the base64-decoded derivative is not, so we mask it explicitly.
      env:
        SECRET_VALUE: ${{ inputs.secret }}
      run: |
        set -euo pipefail

        if [[ -z "${SECRET_VALUE}" ]]; then
          echo "::error::Private key input is not set"
          exit 1
        fi

        if [[ "${SECRET_VALUE}" == *"-----BEGIN"* ]]; then
          echo "Detected unencoded private key in PEM format, skipping base64 decode"
          private_key="${SECRET_VALUE}"
        else
          if ! private_key=$(echo "${SECRET_VALUE}" | base64 -d); then
            echo "::error::Failed to base64 decode private key. Verify the value is valid base64."
            exit 1
          fi
          echo "Decoded private key from base64 input -- adding mask to prevent accidental exposure in logs"
          while IFS= read -r line; do
            [[ -n "$line" ]] && echo "::add-mask::$line"
          done <<< "${private_key}"
        fi

        if [[ "${private_key}" != *"-----BEGIN"* ]]; then
          echo "::error::Decoded private key does not look like a PEM key (missing -----BEGIN header). Check encoding."
          exit 1
        fi

        # Random delimiter prevents injection via crafted secret values
        delimiter="pk_$(head -c 16 /dev/urandom | od -An -tx1 | tr -d ' \n')"
        {
          echo "private-key<<${delimiter}"
          echo "${private_key}"
          echo "${delimiter}"
        } >> "$GITHUB_OUTPUT"
